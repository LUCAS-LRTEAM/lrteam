<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Professor LR | Transforme o Futevôlei em Profissão</title>
    <meta name="description" content="Aprenda como dar aulas de futevôlei que fazem seus alunos evoluírem, conquistar mais alunos, cobrar mais caro e construir uma renda consistente.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-dark-2: #0f1525;
            --bg-card: #141c30;
            --bg-card-hover: #1a2440;
            --blue: #1e90ff;
            --blue-light: #4eb5ff;
            --blue-dark: #0a4d8c;
            --orange: #ff7a18;
            --orange-light: #ffa050;
            --orange-dark: #e6660a;
            --white: #ffffff;
            --gray: #8b95a7;
            --gray-light: #c4ccd9;
            --gray-dark: #4a5468;
            --gradient-blue: linear-gradient(135deg, #0a4d8c 0%, #1e90ff 100%);
            --gradient-orange: linear-gradient(135deg, #e6660a 0%, #ff7a18 100%);
            --gradient-dark: linear-gradient(180deg, #0a0e1a 0%, #0f1525 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e1a 0%, #0a1a3a 50%, #0a0e1a 100%);
            --shadow-glow-blue: 0 0 40px rgba(30, 144, 255, 0.3);
            --shadow-glow-orange: 0 0 40px rgba(255, 122, 24, 0.35);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==================== SCROLLBAR ==================== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--blue-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue); }

        /* ==================== NAVBAR ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 16px 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(30, 144, 255, 0.12);
            transition: var(--transition);
        }

        .navbar.scrolled {
            padding: 10px 0;
            background: rgba(10, 14, 26, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-logo span {
            color: var(--orange);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            color: var(--gray-light);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--blue-light);
        }

        .nav-cta {
            background: var(--gradient-orange);
            color: var(--white) !important;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(255, 122, 24, 0.3);
            transition: var(--transition);
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(255, 122, 24, 0.5);
            color: var(--white) !important;
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
        }

        .nav-toggle span {
            width: 24px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: var(--transition);
        }

        .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section {
            padding: 100px 0;
            position: relative;
        }

        .section-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--orange);
            margin-bottom: 16px;
            position: relative;
            padding-left: 40px;
        }

        .section-tag::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 30px;
            height: 2px;
            background: var(--orange);
            border-radius: 2px;
        }

        .section-title {
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .section-title .highlight {
            background: var(--gradient-orange);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title .highlight-blue {
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            font-size: 1.15rem;
            color: var(--gray-light);
            max-width: 700px;
            line-height: 1.7;
        }

        .text-center { text-align: center; }
        .text-center .section-tag { padding-left: 0; }
        .text-center .section-tag::before { display: none; }
        .text-center .section-subtitle { margin: 0 auto; }

        /* ==================== BUTTONS ==================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-orange);
            color: var(--white);
            box-shadow: var(--shadow-glow-orange);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 50px rgba(255, 122, 24, 0.5);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--blue);
        }

        .btn-secondary:hover {
            background: var(--blue);
            transform: translateY(-2px);
        }

        .btn-large {
            padding: 22px 56px;
            font-size: 1.15rem;
        }

        /* ==================== HERO ==================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 0 80px;
            background: var(--gradient-hero);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 122, 24, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 144, 255, 0.1);
            border: 1px solid rgba(30, 144, 255, 0.3);
            color: var(--blue-light);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 28px;
            backdrop-filter: blur(10px);
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .hero-title .gradient-text {
            background: var(--gradient-orange);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--gray-light);
            margin-bottom: 40px;
            line-height: 1.7;
            max-width: 520px;
        }

        .hero-cta-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .hero-stat {
            text-align: left;
        }

        .hero-stat .number {
            font-size: 2.2rem;
            font-weight: 900;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .hero-stat .label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 6px;
        }

        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-mockup {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .hero-mockup-frame {
            background: linear-gradient(145deg, #141c30, #0f1525);
            border: 1px solid rgba(30, 144, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 80px rgba(30, 144, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .hero-mockup-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-orange);
        }

        .mockup-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .mockup-badge {
            background: var(--gradient-orange);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mockup-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--white);
        }

        .mockup-modules {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mockup-module {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: var(--transition);
        }

        .mockup-module:hover {
            background: rgba(30, 144, 255, 0.08);
            border-color: rgba(30, 144, 255, 0.2);
            transform: translateX(4px);
        }

        .mockup-module-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--gradient-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--white);
            flex-shrink: 0;
        }

        .mockup-module-icon.orange {
            background: var(--gradient-orange);
        }

        .mockup-module-text {
            font-size: 0.85rem;
            color: var(--gray-light);
            font-weight: 500;
        }

        .mockup-module-duration {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--gray-dark);
        }

        .mockup-progress {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mockup-progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .mockup-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gradient-orange);
            border-radius: 3px;
            transition: width 2s ease-out;
        }

        .mockup-progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--gray-dark);
        }

        .floating-badge {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid rgba(30, 144, 255, 0.3);
            border-radius: 12px;
            padding: 12px 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: float 3s ease-in-out infinite;
        }

        .floating-badge.top {
            top: -20px;
            right: -10px;
            animation-delay: 0s;
        }

        .floating-badge.bottom {
            bottom: -20px;
            left: -20px;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .floating-badge .icon {
            font-size: 1.4rem;
        }

        .floating-badge .text {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .floating-badge .text small {
            display: block;
            color: var(--gray);
            font-size: 0.7rem;
            font-weight: 400;
        }

        /* ==================== AUDIENCE ==================== */
        .audience {
            background: var(--bg-dark-2);
            border-top: 1px solid rgba(30, 144, 255, 0.08);
            border-bottom: 1px solid rgba(30, 144, 255, 0.08);
        }

        .audience-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 50px;
        }

        .audience-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 36px 28px;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .audience-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-blue);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .audience-card:hover {
            transform: translateY(-6px);
            border-color: rgba(30, 144, 255, 0.2);
            background: var(--bg-card-hover);
        }

        .audience-card:hover::before {
            transform: scaleX(1);
        }

        .audience-card .icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
            display: block;
        }

        .audience-card h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .audience-card p {
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.5;
        }

        /* ==================== PROBLEMS ==================== */
        .problems {
            background: var(--bg-dark);
        }

        .problems-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        .problem-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 32px 24px;
            text-align: center;
            transition: var(--transition);
            position: relative;
        }

        .problem-card:hover {
            border-color: rgba(255, 122, 24, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .problem-card .problem-icon {
            font-size: 2.2rem;
            margin-bottom: 16px;
            display: block;
            filter: grayscale(0.2);
        }

        .problem-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--white);
        }

        .problem-card p {
            font-size: 0.82rem;
            color: var(--gray);
            line-height: 1.5;
        }

        /* ==================== SOLUTION ==================== */
        .solution {
            background: var(--bg-dark-2);
            position: relative;
            overflow: hidden;
        }

        .solution::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.06) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
        }

        .solution-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .solution-visual {
            position: relative;
        }

        .solution-card {
            background: linear-gradient(145deg, #141c30, #0f1525);
            border: 1px solid rgba(30, 144, 255, 0.15);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-card);
            position: relative;
        }

        .solution-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-orange);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .solution-card-label {
            display: inline-block;
            background: var(--gradient-orange);
            color: var(--white);
            padding: 6px
