    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-dark-2: #0f1525;
            --bg-card: #141c30;
            --bg-card-hover: #1a2440;
            --blue: #1e90ff;
            --blue-light: #4eb5ff;
            --blue-dark: #0a4d8c;
            --orange: #ff7a18;
            --orange-light: #ffa050;
            --orange-dark: #e6660a;
            --white: #ffffff;
            --gray: #8b95a7;
            --gray-light: #c4ccd9;
            --gray-dark: #4a5468;
            --gradient-blue: linear-gradient(135deg, #0a4d8c 0%, #1e90ff 100%);
            --gradient-orange: linear-gradient(135deg, #e6660a 0%, #ff7a18 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e1a 0%, #0a1a3a 50%, #0a0e1a 100%);
            --shadow-glow-orange: 0 0 40px rgba(255, 122, 24, 0.35);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--blue-dark); border-radius: 4px; }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 16px 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(30, 144, 255, 0.12);
            transition: var(--transition);
        }
        .navbar.scrolled { padding: 10px 0; background: rgba(10, 14, 26, 0.95); box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--white); text-decoration: none; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--orange); }
        .nav-links { display: flex; gap: 32px; align-items: center; list-style: none; }
        .nav-links a { color: var(--gray-light); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); }
        .nav-links a:hover { color: var(--blue-light); }
        .nav-cta {
            background: var(--gradient-orange); color: var(--white) !important;
            padding: 10px 24px; border-radius: 50px; font-weight: 700; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(255,122,24,0.3); transition: var(--transition);
        }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,122,24,0.5); }
        .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 8px; }
        .nav-toggle span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: var(--transition); }
        .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* CONTAINER & SECTIONS */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .section { padding: 100px 0; position: relative; }
        .section-tag {
            display: inline-block; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px; color: var(--orange);
            margin-bottom: 16px; position: relative; padding-left: 40px;
        }
        .section-tag::before { content: ''; position: absolute; left: 0; top: 50%; width: 30px; height: 2px; background: var(--orange); border-radius: 2px; }
        .section-title { font-size: 2.6rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; }
        .section-title .highlight { background: var(--gradient-orange); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .section-title .highlight-blue { background: var(--gradient-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .section-subtitle { font-size: 1.15rem; color: var(--gray-light); max-width: 700px; line-height: 1.7; }
        .text-center { text-align: center; }
        .text-center .section-tag { padding-left: 0; }
        .text-center .section-tag::before { display: none; }
        .text-center .section-subtitle { margin: 0 auto; }
